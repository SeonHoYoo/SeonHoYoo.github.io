# About Section
about_profile_image: images/profile.jpg
about_content: |
  I am SeonHo Yoo, an undergraduate researcher at Korea University interested in **graph machine learning**, **anomaly detection**, and **optimization for machine learning**.

  My research focuses on building reliable and efficient AI systems for structured data and decision-making problems. I am particularly interested in <mark>Graph-driven Representation & Decision Making</mark> and <mark>Mathematical Optimization for Machine Learning</mark>.

  - Self-Supervised & Pre-training on Graphs
  - Graph-based Anomaly Detection
  - Combinatorial Optimization on Graphs
  - Graph-augmented Reinforcement Learning

  You can view my <a href="/assets/SeonHoYoo_CV.pdf" target="_blank" rel="noopener">CV here</a>.
