about_content: |
  I am SeonHo Yoo, an industrial AI researcher at Korea University working on **reliable machine learning**, **anomaly detection**, and **optimization-informed AI** for industrial applications.  
  My research aims to develop trustworthy and efficient AI methods for structured data and operational decision-making problems.

  - Anomaly Detection and Robust Predictive Modeling
  - Optimization-aware Learning and Decision-making
  - AI for Operations and Industrial Systems
  - Data-centric Methods for Real-world Applications

  You can view my <a href="/assets/SeonHoYoo_CV.pdf" target="_blank" rel="noopener">CV here</a>.
